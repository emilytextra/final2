<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Inventory Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="menu-bar">
    <a href="index.html">Dashboard</a>
    <a href="about.html">About</a>
  </div>

  <div class="container">
    <h1 class="ocean-header">Warehouse Inventory Dashboard</h1>

    <!-- Input form -->
    <form id="addItemForm" class="ocean-form">
      <label for="itemName">Item Name:</label>
      <input type="text" id="itemName" name="itemName" placeholder="Enter item name" required>
      
      <label for="itemQuantity">Quantity:</label>
      <input type="number" id="itemQuantity" name="itemQuantity" placeholder="Enter quantity" required>
      
      <button type="submit">Add</button>
    </form>

    <!-- Inventory Table -->
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
        <!-- Items will be dynamically inserted here -->
      </tbody>
    </table>

    <h2 class="ocean-header">Inventory Chart</h2>
    <canvas id="inventoryChart"></canvas>
    <button id="clearAllButton" class="clear-button">Clear All Items</button>
  </div>

  <!-- Include Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
